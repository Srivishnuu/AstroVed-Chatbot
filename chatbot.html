<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AstroVed.AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:      #C9A84C;
    --gold-light:#E8C97A;
    --gold-glow: rgba(201,168,76,0.25);
    --deep:      #0D0B1A;
    --panel:     #13102A;
    --surface:   #1C1836;
    --border:    rgba(201,168,76,0.2);
    --text:      #EEE8D5;
    --muted:     rgba(238,232,213,0.5);
    --user-bubble: linear-gradient(135deg,#7B5EA7,#4A3580);
    --bot-bubble:  #1C1836;
    --radius:    18px;
    --font-head: 'Cinzel', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: #0a0816;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ─── Star canvas background ─── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── Chat trigger button ─── */
  #chat-trigger {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg,#7B5EA7,#C9A84C);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 24px var(--gold-glow), 0 4px 16px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: transform .2s, box-shadow .2s;
  }
  #chat-trigger:hover { transform: scale(1.08); box-shadow: 0 0 36px var(--gold-glow), 0 6px 20px rgba(0,0,0,0.5); }
  #chat-trigger svg { width: 28px; height: 28px; fill: #fff; }

  /* ─── Pulse ring ─── */
  #chat-trigger::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    opacity: 0;
    animation: pulse-ring 2.4s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: .6; }
    100% { transform: scale(1.5); opacity: 0;  }
  }

  /* ─── Chat window ─── */
  #chat-window {
    position: fixed;
    bottom: 104px;
    right: 28px;
    width: 390px;
    max-height: 620px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px var(--border);
    z-index: 999;
    transform-origin: bottom right;
    transform: scale(0.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ─── Header ─── */
  .chat-header {
    background: linear-gradient(135deg, #1a1535 0%, #0f0d24 100%);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .chat-header::before {
    content:'';
    position: absolute;
    top: -30px; left: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(201,168,76,.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-wrap {
    width: 42px; height: 42px;
    background: linear-gradient(135deg,#2a2050,#1a1535);
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .logo-wrap svg { width: 22px; height: 22px; }

  .header-info { flex: 1; }
  .header-name {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: .04em;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .online-dot {
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  .close-btn {
    background: rgba(255,255,255,.07);
    border: none;
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    font-size: 18px;
  }
  .close-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }

  /* ─── Screens ─── */
  .screen {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── LEAD FORM SCREEN ─── */
  #form-screen {
    padding: 24px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .form-hero {
    text-align: center;
    margin-bottom: 22px;
  }
  .form-hero .star-icon {
    font-size: 32px;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px var(--gold));
  }
  .form-hero h2 {
    font-family: var(--font-head);
    font-size: 17px;
    color: var(--gold-light);
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  .form-hero p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field-group input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field-group input::placeholder { color: rgba(238,232,213,.3); }
  .field-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }

  .start-btn {
    width: 100%;
    background: linear-gradient(135deg,#7B5EA7 0%,#C9A84C 100%);
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .06em;
    color: #fff;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s, transform .15s;
    box-shadow: 0 4px 20px rgba(123,94,167,.4);
  }
  .start-btn:hover { opacity: .9; transform: translateY(-1px); }
  .start-btn:active { transform: scale(.98); }

  .form-privacy {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
  }

  /* ─── CHAT SCREEN ─── */
  #chat-screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }
  #chat-screen.active { display: flex; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome card */
  .welcome-card {
    background: linear-gradient(135deg,rgba(123,94,167,.2),rgba(201,168,76,.1));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 4px;
  }
  .welcome-card .wc-name {
    font-family: var(--font-head);
    font-size: 13px;
    color: var(--gold-light);
    margin-bottom: 6px;
  }
  .welcome-card p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  /* Messages */
  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    animation: msg-in .25s ease-out;
  }
  @keyframes msg-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .avatar.bot {
    background: linear-gradient(135deg,#2a2050,#1a1535);
    border: 1px solid var(--gold);
  }
  .avatar.user-av {
    background: linear-gradient(135deg,#7B5EA7,#4A3580);
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    font-family: var(--font-body);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce .9s ease-in-out infinite;
    opacity: .6;
  }
  .typing-bubble span:nth-child(2) { animation-delay: .15s; }
  .typing-bubble span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 8px;
  }
  .qr-btn {
    background: rgba(201,168,76,.1);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--gold-light);
    cursor: pointer;
    font-family: var(--font-body);
    transition: background .15s;
  }
  .qr-btn:hover { background: rgba(201,168,76,.2); }

  /* ─── Input bar ─── */
  .input-bar {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    background: rgba(13,11,26,.6);
  }
  #user-input {
    flex: 1;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-family: var(--font-body);
    font-size: 13.5px;
    color: var(--text);
    outline: none;
    resize: none;
    line-height: 1.4;
    max-height: 100px;
    transition: border-color .2s;
  }
  #user-input::placeholder { color: rgba(238,232,213,.3); }
  #user-input:focus { border-color: rgba(201,168,76,.5); }

  #send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg,#7B5EA7,#C9A84C);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .15s, opacity .15s;
    box-shadow: 0 2px 12px rgba(123,94,167,.4);
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:active { transform: scale(.95); }
  #send-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 2px; }

  /* ─── Footer tag ─── */
  .chat-footer {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: rgba(238,232,213,.25);
    letter-spacing: .03em;
  }

  /* ─── Divider ─── */
  .divider {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    position: relative;
    margin: 4px 0;
  }
  .divider::before, .divider::after {
    content:'';
    position:absolute;
    top:50%;
    width:30%;
    height:1px;
    background: var(--border);
  }
  .divider::before { left:0; }
  .divider::after { right:0; }

  /* ─── Responsive ─── */
  @media (max-width: 480px) {
    #chat-window { width: calc(100vw - 20px); right: 10px; bottom: 90px; }
  }
</style>
</head>
<body>

<!-- Starfield background -->
<canvas id="stars-canvas"></canvas>

<!-- Floating trigger button -->
<button id="chat-trigger" onclick="toggleChat()" aria-label="Open AstroVed.AI chat">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C6.48 2 2 6.03 2 11c0 2.56 1.15 4.87 3 6.5V22l4.3-2.15c.88.21 1.77.15 2.7.15 5.52 0 10-4.03 10-9S17.52 2 12 2zm1 13H7v-2h6v2zm3-4H7V9h9v2z"/>
  </svg>
</button>

<!-- ─── Chat window ─── -->
<div id="chat-window" role="dialog" aria-label="AstroVed.AI chat">

  <!-- Header -->
  <div class="chat-header">
    <div class="logo-wrap">
      <!-- AstroVed star/vedic logo SVG -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,2 14.9,9.3 22.8,9.3 16.5,14 18.8,21.4 12,17 5.2,21.4 7.5,14 1.2,9.3 9.1,9.3" fill="#C9A84C" opacity="0.9"/>
        <circle cx="12" cy="12" r="3" fill="#1a1535"/>
        <circle cx="12" cy="12" r="1.2" fill="#E8C97A"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">AstroVed.AI</div>
      <div class="header-sub">
        <span class="online-dot"></span>
        Vedic Astrology Assistant
      </div>
    </div>
    <button class="close-btn" onclick="toggleChat()" aria-label="Close chat">&#x2715;</button>
  </div>

  <!-- ─── SCREEN 1: Lead form ─── -->
  <div class="screen" id="form-screen">
    <div class="form-hero">
      <span class="star-icon">✦</span>
      <h2>Begin Your Journey</h2>
      <p>Share a little about yourself before we explore the stars together.</p>
    </div>

    <div class="field-group">
      <label>Your Name</label>
      <input type="text" id="f-name" placeholder="e.g. Arjun Sharma" autocomplete="name"/>
    </div>
    <div class="field-group">
      <label>Email Address</label>
      <input type="email" id="f-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field-group">
      <label>Phone Number</label>
      <input type="tel" id="f-phone" placeholder="+91 98765 43210" autocomplete="tel"/>
    </div>

    <button class="start-btn" onclick="startChat()">✦ &nbsp;Start Consulting</button>

    <p class="form-privacy">🔒 Your information is kept private &amp; secure</p>
  </div>

  <!-- ─── SCREEN 2: Chat ─── -->
  <div class="screen" id="chat-screen">
    <div id="messages">
      <!-- Welcome card injected by JS -->
    </div>

    <!-- Quick reply suggestions -->
    <div class="quick-replies" id="quick-replies">
      <button class="qr-btn" onclick="quickReply(this)">🪐 My birth chart</button>
      <button class="qr-btn" onclick="quickReply(this)">💑 Love compatibility</button>
      <button class="qr-btn" onclick="quickReply(this)">💼 Career guidance</button>
      <button class="qr-btn" onclick="quickReply(this)">🌙 Today's rashi</button>
    </div>

    <div class="input-bar">
      <textarea id="user-input" placeholder="Ask about your stars…" rows="1"
        onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="chat-footer">Powered by AstroVed.AI &nbsp;✦</div>
</div>

<script>
// ─── Starfield ───────────────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
  }
  function make() {
    stars = Array.from({length: 160}, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.4 + .2,
      a: Math.random(),
      da: (Math.random() * .004 + .001) * (Math.random() < .5 ? 1 : -1),
    }));
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < .1) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220,210,180,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); make(); });
  resize(); make(); draw();
})();

// ─── State ───────────────────────────────────────────────────────────────────
let isOpen  = false;
let userName = '';
let history  = [];   // [{role,content}]
const API    = 'http://localhost:8000'; // ← change to your Render URL
const SESSION = 'sess_' + Math.random().toString(36).slice(2);

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('chat-window').classList.toggle('open', isOpen);
}

// ─── Form → Chat ─────────────────────────────────────────────────────────────
function startChat() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();

  if (!name)  { shake('f-name');  return; }
  if (!email) { shake('f-email'); return; }
  if (!phone) { shake('f-phone'); return; }

  userName = name.split(' ')[0];

  document.getElementById('form-screen').style.display  = 'none';
  const cs = document.getElementById('chat-screen');
  cs.classList.add('active');

  // Welcome message
  const msgs = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'welcome-card';
  card.innerHTML = `
    <div class="wc-name">Namaste, ${userName} 🙏</div>
    <p>I'm <strong>AstroVed.AI</strong>, your personal Vedic astrology guide. Ask me about your birth chart, planetary transits, compatibility, or any cosmic questions on your mind.</p>`;
  msgs.appendChild(card);

  // Initial greeting from bot
  addBotMessage(`Welcome, ${userName}! The stars have much to reveal. What would you like to explore today?`);
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#f87171';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake .4s ease';
  setTimeout(() => { el.style.borderColor = ''; el.style.animation = ''; }, 800);
}

// ─── Messaging ───────────────────────────────────────────────────────────────
function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const initials = userName.slice(0,2).toUpperCase();
  row.innerHTML = `
    <div class="bubble user">${escHtml(text)}</div>
    <div class="avatar user-av">${initials}</div>`;
  msgs.appendChild(row);
  scrollDown();
}

function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="avatar bot">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
        <polygon points="12,2 14.9,9.3 22.8,9.3 16.5,14 18.8,21.4 12,17 5.2,21.4 7.5,14 1.2,9.3 9.1,9.3" fill="#C9A84C"/>
      </svg>
    </div>
    <div class="bubble bot">${escHtml(text)}</div>`;
  msgs.appendChild(row);
  scrollDown();
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  row.innerHTML = `
    <div class="avatar bot">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
        <polygon points="12,2 14.9,9.3 22.8,9.3 16.5,14 18.8,21.4 12,17 5.2,21.4 7.5,14 1.2,9.3 9.1,9.3" fill="#C9A84C"/>
      </svg>
    </div>
    <div class="bubble bot typing-bubble"><span></span><span></span><span></span></div>`;
  msgs.appendChild(row);
  scrollDown();
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function scrollDown() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── Send ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '';

  // Hide quick replies after first send
  document.getElementById('quick-replies').style.display = 'none';

  addUserMessage(text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION, message: text })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || 'I am momentarily consulting the stars. Please try again.';
    history.push({ role: 'assistant', content: reply });
    addBotMessage(reply);
  } catch {
    removeTyping();
    addBotMessage('⚠️ Unable to connect to the server. Please check if the backend is running.');
  }
}

function quickReply(btn) {
  document.getElementById('user-input').value = btn.textContent.trim().replace(/^[^\s]+\s/, '');
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Add shake keyframe dynamically
const ks = document.createElement('style');
ks.textContent = `@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}`;
document.head.appendChild(ks);
</script>
</body>
</html>
